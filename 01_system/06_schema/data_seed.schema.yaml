{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "title": "Data Seed",
  "type": "object",
  "required": [
    "id",
    "type",
    "status",
    "source_refs",
    "created_by_function",
    "function_version",
    "prior_seed",
    "next_seed",
    "uncertainty",
    "selected_data",
    "active_field"
  ],
  "properties": {
    "id": {
      "type": "string"
    },
    "type": {
      "type": "string",
      "const": "data_seed"
    },
    "status": {
      "type": "string"
    },
    "source_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "created_by_function": {
      "type": "string"
    },
    "function_version": {
      "type": "string"
    },
    "prior_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "next_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "uncertainty": {
      "type": [
        "string",
        "number",
        "null"
      ]
    },
    "contract_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "schema_status": {
      "type": "string"
    },
    "selected_data": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "active_field": {
      "type": "string"
    }
  },
  "additionalProperties": true
}

{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "title": "Relation Seed",
  "type": "object",
  "required": [
    "id",
    "type",
    "status",
    "source_refs",
    "created_by_function",
    "function_version",
    "prior_seed",
    "next_seed",
    "uncertainty",
    "source_node",
    "target_node",
    "direction",
    "relation_role",
    "evidence_refs"
  ],
  "properties": {
    "id": {
      "type": "string"
    },
    "type": {
      "type": "string"
    },
    "status": {
      "type": "string"
    },
    "source_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "created_by_function": {
      "type": "string"
    },
    "function_version": {
      "type": "string"
    },
    "prior_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "next_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "uncertainty": {
      "type": [
        "string",
        "number",
        "null"
      ]
    },
    "source_node": {
      "type": "string"
    },
    "target_node": {
      "type": "string"
    },
    "direction": {
      "type": "string"
    },
    "relation_role": {
      "type": "string"
    },
    "evidence_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    }
  },
  "additionalProperties": true
}

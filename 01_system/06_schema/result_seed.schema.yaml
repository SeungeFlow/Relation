{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "title": "Result Seed",
  "type": "object",
  "required": [
    "id",
    "type",
    "status",
    "source_refs",
    "created_by_function",
    "function_version",
    "prior_seed",
    "next_seed",
    "uncertainty",
    "local_answer",
    "evidence_refs",
    "comparison_refs",
    "limitations",
    "unresolved_relations",
    "next_question_refs"
  ],
  "properties": {
    "id": {
      "type": "string"
    },
    "type": {
      "type": "string"
    },
    "status": {
      "type": "string"
    },
    "source_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "created_by_function": {
      "type": "string"
    },
    "function_version": {
      "type": "string"
    },
    "prior_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "next_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "uncertainty": {
      "type": [
        "string",
        "number",
        "null"
      ]
    },
    "local_answer": {
      "type": "string"
    },
    "evidence_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "comparison_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "limitations": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "unresolved_relations": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "next_question_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    }
  },
  "additionalProperties": true
}

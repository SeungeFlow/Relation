{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "title": "Source Seed",
  "type": "object",
  "required": [
    "id",
    "type",
    "status",
    "source_refs",
    "created_by_function",
    "function_version",
    "prior_seed",
    "next_seed",
    "uncertainty",
    "source_identity",
    "location",
    "source_time",
    "access_time"
  ],
  "properties": {
    "id": {
      "type": "string"
    },
    "type": {
      "type": "string"
    },
    "status": {
      "type": "string"
    },
    "source_refs": {
      "type": "array",
      "items": {
        "type": "string"
      }
    },
    "created_by_function": {
      "type": "string"
    },
    "function_version": {
      "type": "string"
    },
    "prior_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "next_seed": {
      "type": [
        "string",
        "null"
      ]
    },
    "uncertainty": {
      "type": [
        "string",
        "number",
        "null"
      ]
    },
    "source_identity": {
      "type": "string"
    },
    "location": {
      "type": "string"
    },
    "source_time": {
      "type": "string"
    },
    "access_time": {
      "type": "string"
    }
  },
  "additionalProperties": true
}

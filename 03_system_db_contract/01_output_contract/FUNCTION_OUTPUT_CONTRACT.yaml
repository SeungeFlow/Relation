{
  "function_output_contract": {
    "contract_version": "0.1-foundation",
    "required_common_fields": [
      "id",
      "type",
      "status",
      "source_refs",
      "created_by_function",
      "function_version",
      "prior_seed",
      "next_seed",
      "uncertainty"
    ],
    "output_rules": {
      "question_seed": {
        "schema": "01_system/06_schema/question_seed.schema.yaml",
        "index_registration_required": true
      },
      "source_seed": {
        "schema": "01_system/06_schema/source_seed.schema.yaml",
        "index_registration_required": true
      },
      "data_seed": {
        "schema": "01_system/06_schema/data_seed.schema.yaml",
        "index_registration_required": true
      },
      "center_cell": {
        "schema": "01_system/06_schema/center_cell.schema.yaml",
        "index_registration_required": true
      },
      "relation_seed": {
        "schema": "01_system/06_schema/relation_seed.schema.yaml",
        "index_registration_required": true
      },
      "evidence_seed": {
        "schema": "01_system/06_schema/evidence_seed.schema.yaml",
        "index_registration_required": true
      },
      "comparison_seed": {
        "schema": "01_system/06_schema/comparison_seed.schema.yaml",
        "index_registration_required": true
      },
      "result_seed": {
        "schema": "01_system/06_schema/result_seed.schema.yaml",
        "index_registration_required": true,
        "next_question_required": true,
        "provenance_required": true
      }
    },
    "non_seed_output_types": [
      "source_boundary"
    ],
    "prohibited": [
      "overwrite_prior_result_without_new_result_id",
      "create_relation_without_source_reference",
      "close_result_without_comparison_or_absence_reason",
      "omit_next_question_from_local_result"
    ]
  }
}

{
  "version_binding_policy": {
    "binding_version": "0.1-foundation",
    "bind": [
      "system_function_version",
      "db_seed_id",
      "source_state_commit",
      "result_seed_id",
      "provenance_id"
    ],
    "rules": [
      "current_commit_must_not_self_reference_inside_same_commit",
      "source_state_commit_may_reference_prior_verified_state",
      "implementation_commit_is_reported_in_handoff_result",
      "new_function_version_requires_new_result_or_explicit_reanalysis",
      "prior_result_must_remain_traceable"
    ]
  }
}

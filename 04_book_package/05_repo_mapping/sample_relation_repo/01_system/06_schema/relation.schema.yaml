schema:
  title: Relation Seed
  required:
    - relation_id
    - source_node
    - target_node
    - relation_role
    - status
  properties:
    relation_id: {type: string}
    source_node: {type: string}
    target_node: {type: string}
    mediated_by: {type: [string, "null"]}
    relation_role: {type: string}
    source_refs: {type: array}
    evidence_refs: {type: array}
    comparison_refs: {type: array}
    status: {type: string}
    uncertainty: {type: string}

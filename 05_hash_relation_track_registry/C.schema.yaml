schema_name: observable_C_projection_contract
schema_version: "1.0.0"
document_role: OBSERVABLE_STATE_SCHEMA
conceptual_root: Hash_Relation_Track_DB

definition:
  C: Generated observable projection of canonical Relation records and Git state.

principles:
  - C is not another source of truth.
  - C does not replace Relation Registry or Git.
  - C does not contain private chain-of-thought.
  - C projects declared and derived effective state separately.
  - Live C is generated on demand.
  - Closure C Snapshot is immutable evidence.
  - Missing evidence produces HOLD.
  - Branching Track tips remain visible.
  - Byte, position, semantic, relation, track and occupation changes remain separate.

projection_sources:
  required:
    - genesis_binding_record
    - semantic_identity_records
    - object_state_records
    - position_binding_records
    - semantic_relation_records
    - track_event_records
    - git_repository_state

  optional:
    - seat_occupation_records
    - prior_verified_C_snapshot
    - independent_verification_records

live_C:
  persistence_required: false
  generation_mode: ON_DEMAND
  preferred_human_readable_format: YAML
  canonical_identity: false

closure_C_snapshot:
  persistence_required: true
  canonical_registry:
    repository: SeungeFlow/Relation
    branch: main
    path: 05_hash_relation_track_registry/
    record_type: C_SNAPSHOT

  canonical_byte_format: JSON
  object_state_record_required: true

canonical_JSON_rules:
  encoding: UTF-8
  byte_order_mark: FORBIDDEN
  unicode_normalization: NFC
  object_key_order: LEXICOGRAPHIC_BY_UNICODE_CODE_POINT
  insignificant_whitespace: FORBIDDEN
  separators:
    object_member: ","
    key_value: ":"
  strings:
    ensure_ascii: false
    slash_escape: FORBIDDEN
    quote_and_backslash_escape: REQUIRED
    control_character_escape: REQUIRED
    optional_escape_sequences: FORBIDDEN
  numbers:
    allowed: false
    representation_rule: USE_DECIMAL_STRINGS
  arrays:
    ordered_sequences: PRESERVE_SCHEMA_ORDER
    set_like_arrays: SORT_BY_CANONICAL_ELEMENT_BYTES
  final_newline: LF_REQUIRED

C_template:
  projection_id: ""
  schema_version: "1.0.0"
  generated_at: ""

  generated_from:
    relation_registry_commit: ""
    repository_refs: []
    prior_verified_snapshot_ref: null

  root:
    conceptual_root: Hash_Relation_Track_DB
    publication_doi: ""
    active_schema_package_sha256: ""
    active_schema_manifest_digest: ""
    genesis_binding_record_id: ""
    genesis_binding_storage_commit: ""

  deployment:
    deployment_set_id: D0

    Bridge:
      repository: SeungeFlow/Bridge
      branch: start_position
      path: 01_active_schema/
      payload_commit: ""
      payload_tree: ""
      current_commit: ""
      current_tree: ""

    for_instance:
      repository: SeungeFlow/for_instance
      branch: main
      path: 09_active_schema_binding/
      payload_commit: ""
      payload_tree: ""
      current_commit: ""
      current_tree: ""

    Relation:
      repository: SeungeFlow/Relation
      branch: main
      path: 05_hash_relation_track_registry/
      payload_commit: ""
      payload_tree: ""
      genesis_binding_storage_commit: ""
      current_commit: ""
      current_tree: ""

  declared_state:
    validation: CANDIDATE
    lifecycle: CURRENT
    closure: OPEN

  effective_state:
    validation: ""
    lifecycle: ""
    closure: ""
    derived_from_record_ids: []

  current_objects:
    semantic_identity_refs: []
    object_state_refs: []
    position_binding_refs: []
    semantic_relation_refs: []
    track_event_tip_refs: []
    seat_occupation_refs: []

  delta:
    object_state:
      added: []
      removed: []
      superseded: []

    position_binding:
      added: []
      removed: []
      canonicality_changed: []

    semantic_identity:
      added: []
      superseded: []
      relation_changed: []

    semantic_relation:
      added: []
      superseded: []
      conflicted: []

    track_event:
      added: []
      current_tips_changed: []
      branched_tracks: []

    seat_occupation:
      started: []
      ended: []
      result_handoffs: []

    git:
      changed_refs: []

  singularity:
    negative: []
    positive: []

  evidence:
    gate_results: []
    verification_refs: []
    unresolved_mismatches: []

  open_boundaries: []

  next_position:
    state: ""
    required_conditions: []
    candidate_seat_definition_refs: []

generation_rules:

  effective_state:
    - Read declared state from immutable records.
    - Derive effective lifecycle from valid supersedes references.
    - Derive effective closure from valid closure events and relations.
    - Do not mutate historical record bytes.

  current_track_tips:
    - Group events by track_id and Genesis Binding.
    - Remove effectively superseded events.
    - Select events not referenced as predecessors by another current valid event.
    - Preserve multiple tips as a branch set.

  object_delta:
    - Compare Object State identities independently from Position Bindings.
    - A position change does not imply byte-state change.
    - A byte-state change creates a new Object State identity.

  semantic_delta:
    - A semantic change does not imply byte-state change.
    - Preserve multiple Semantic Identity relations when independently valid.

  relation_delta:
    - Compare relation record identities and effective validation states.
    - Do not merge conflicting relations.

  occupation_delta:
    - Existing for_instance assignment history is outside automatic conversion.
    - Include only new Relation SEAT_OCCUPATION runtime records.

  evidence:
    - Every CLOSED effective state requires resolvable Relation and Git evidence.
    - Missing or mismatched evidence produces HOLD.
    - Completion markers do not replace evidence.

  privacy:
    - Exclude private chain-of-thought.
    - Include only observable result, declared summary, evidence and state.

closure_requirements:
  gate_results:
    required_value: PASS

  genesis_binding:
    effective_validation: VERIFIED

  repository_refs:
    all_required_refs_resolve: true

  relation_registry:
    schema_parse: PASS

  git_state:
    required_refs_resolve: true

  open_blocking_boundaries:
    required_count: "0"

  resulting_effective_closure: CLOSED

hold_conditions:
  - required identity unresolved
  - evidence mismatch
  - repository boundary uncertain
  - schema parse failure
  - unresolved branch relation
  - mutation base changed after Gate_0B
